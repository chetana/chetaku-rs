name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: cykt-399216
  REGION: europe-west1
  SERVICE: chetaku-rs
  IMAGE: europe-west1-docker.pkg.dev/cykt-399216/chetaku/chetaku-rs

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .

      - name: Push to Artifact Registry
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},RAWG_API_KEY=${{ secrets.RAWG_API_KEY }},API_KEY=${{ secrets.CHETAKU_API_KEY }}" \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3
